<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshTrack | Expired Item Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 font-sans antialiased">

    <!-- Login Screen -->
    <div id="login-view" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-800">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-8">
                <i class="fas fa-box-archive text-4xl text-indigo-600 mb-2"></i>
                <h1 class="text-2xl font-bold text-gray-800">FreshTrack</h1>
                <p class="text-gray-500">Manage your inventory efficiently</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="admin@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Main Application Layout (Hidden by default) -->
    <div id="main-layout" class="hidden flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col">
            <div class="p-6 text-xl font-bold flex items-center gap-2 border-b border-slate-800">
                <i class="fas fa-leaf text-green-400"></i> FreshTrack
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="#" onclick="showView('dashboard')" class="nav-link active flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition">
                    <i class="fas fa-chart-line w-5"></i> Dashboard
                </a>
                <a href="#" onclick="showView('list')" class="nav-link flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition">
                    <i class="fas fa-list w-5"></i> Item List
                </a>
                <a href="#" onclick="showView('reports')" class="nav-link flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition">
                    <i class="fas fa-file-contract w-5"></i> Reports
                </a>
                <a href="#" onclick="showView('settings')" class="nav-link flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition">
                    <i class="fas fa-cog w-5"></i> Settings
                </a>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <button onclick="logout()" class="flex items-center gap-3 p-3 w-full text-left text-red-400 hover:bg-slate-800 rounded-lg transition">
                    <i class="fas fa-sign-out-alt w-5"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Navigation Bar -->
            <header class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm">
                <h2 id="view-title" class="text-xl font-bold text-gray-800">Dashboard</h2>
                <div class="flex items-center gap-4">
                    <div id="realtime-clock" class="hidden md:flex items-center gap-4 bg-white border border-gray-100 px-4 py-2 rounded-2xl shadow-sm hover:shadow-md transition-all duration-300 cursor-default"></div>
                    <span class="text-sm text-gray-500">Welcome, <span class="font-medium text-gray-800">Administrator</span></span>
                    <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold border border-indigo-200">
                        AD
                    </div>
                </div>
            </header>

            <!-- Dynamic Content -->
            <main class="flex-1 overflow-y-auto p-8" id="content-area">
                <!-- Dashboard View -->
                <div id="view-dashboard" class="view-content">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="stats-grid"></div>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-lg font-black text-gray-800 uppercase tracking-tight">Expiring Soon</h3>
                                <button onclick="showView('list')" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 uppercase tracking-widest flex items-center gap-1 transition">
                                    View Full List <i class="fas fa-chevron-right text-[10px]"></i>
                                </button>
                            </div>
                            <div id="expiring-soon-list" class="space-y-3"></div>
                        </div>

                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <h3 class="text-sm font-black text-gray-400 uppercase tracking-widest mb-6">Inventory Health</h3>
                            <div id="status-distribution" class="space-y-6"></div>
                        </div>
                    </div>
                </div>

                <!-- List View (Hidden by default) -->
                <div id="view-list" class="view-content hidden"></div>

                <!-- Reports View (Hidden by default) -->
                <div id="view-reports" class="view-content hidden"></div>

                <!-- Settings View (Hidden by default) -->
                <div id="view-settings" class="view-content hidden"></div>
            </main>
        </div>
    </div>

    <!-- Edit Item Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-lg font-bold text-gray-800">Edit Inventory Item</h3>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600 transition">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="edit-form" onsubmit="saveEdit(event)" class="p-6 space-y-4">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Item Code</label>
                        <input type="text" id="edit-itemCode" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Location</label>
                        <input type="text" id="edit-location" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Description</label>
                    <input type="text" id="edit-description" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Quantity</label>
                        <input type="number" id="edit-qty" required min="0" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Expiry Date</label>
                        <input type="date" id="edit-expiryDate" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Category</label>
                    <input type="text" id="edit-category" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. Dairy">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Status</label>
                    <select id="edit-status" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition bg-white">
                        <option value="Active">Active</option>
                        <option value="Expiring">Expiring</option>
                        <option value="Expired">Expired</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Return Type</label>
                        <input type="text" id="edit-returnType" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. Returnable">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Supplier Name</label>
                        <input type="text" id="edit-supplierName" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. Global Foods">
                    </div>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeEditModal()" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg font-semibold hover:bg-gray-50 transition">Cancel</button>
                    <button type="submit" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Quantity Calculator Modal -->
    <div id="qty-calc-modal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-xs overflow-hidden border border-gray-100">
            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                <h3 class="font-bold text-gray-700">Stock Adjustment</h3>
                <button onclick="closeQtyCalc()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6">
                <div class="bg-slate-900 rounded-xl p-4 mb-6 text-right">
                    <div id="calc-item-name" class="text-indigo-400 text-[10px] font-bold uppercase mb-1">Item Description</div>
                    <div class="flex justify-between items-end border-b border-slate-700 pb-2 mb-2">
                        <span class="text-slate-500 text-xs">Current Stock</span>
                        <span id="calc-current-qty" class="text-white font-mono text-lg">0</span>
                    </div>
                    <div id="calc-display" class="text-3xl font-mono font-black text-white tracking-tighter">0</div>
                </div>
                
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <button onclick="pressCalc(1)" class="py-3 bg-gray-50 hover:bg-gray-100 rounded-lg font-bold text-gray-700 transition active:scale-95">1</button>
                    <button onclick="pressCalc(2)" class="py-3 bg-gray-50 hover:bg-gray-100 rounded-lg font-bold text-gray-700 transition active:scale-95">2</button>
                    <button onclick="pressCalc(3)" class="py-3 bg-gray-50 hover:bg-gray-100 rounded-lg font-bold text-gray-700 transition active:scale-95">3</button>
                    <button onclick="pressCalc(4)" class="py-3 bg-gray-50 hover:bg-gray-100 rounded-lg font-bold text-gray-700 transition active:scale-95">4</button>
                    <button onclick="pressCalc(5)" class="py-3 bg-gray-50 hover:bg-gray-100 rounded-lg font-bold text-gray-700 transition active:scale-95">5</button>
                    <button onclick="pressCalc(6)" class="py-3 bg-gray-50 hover:bg-gray-100 rounded-lg font-bold text-gray-700 transition active:scale-95">6</button>
                    <button onclick="pressCalc(7)" class="py-3 bg-gray-50 hover:bg-gray-100 rounded-lg font-bold text-gray-700 transition active:scale-95">7</button>
                    <button onclick="pressCalc(8)" class="py-3 bg-gray-50 hover:bg-gray-100 rounded-lg font-bold text-gray-700 transition active:scale-95">8</button>
                    <button onclick="pressCalc(9)" class="py-3 bg-gray-50 hover:bg-gray-100 rounded-lg font-bold text-gray-700 transition active:scale-95">9</button>
                    <button onclick="pressCalc('C')" class="py-3 bg-red-50 text-red-600 hover:bg-red-100 rounded-lg font-bold transition active:scale-95">C</button>
                    <button onclick="pressCalc(0)" class="py-3 bg-gray-50 hover:bg-gray-100 rounded-lg font-bold text-gray-700 transition active:scale-95">0</button>
                    <button onclick="pressCalc('BS')" class="py-3 bg-gray-50 hover:bg-gray-100 rounded-lg font-bold text-gray-700 transition active:scale-95">
                        <i class="fas fa-backspace text-xs"></i>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="submitAdjustment('add')" class="flex items-center justify-center gap-2 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 transition active:scale-95 shadow-lg shadow-green-200">
                        <i class="fas fa-plus-circle"></i> Add
                    </button>
                    <button onclick="submitAdjustment('sub')" class="flex items-center justify-center gap-2 py-3 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 transition active:scale-95 shadow-lg shadow-red-200">
                        <i class="fas fa-minus-circle"></i> Sub
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Item Modal -->
    <div id="add-modal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-lg font-bold text-gray-800">Add New Inventory Item</h3>
                <button onclick="closeAddModal()" class="text-gray-400 hover:text-gray-600 transition">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="add-form" onsubmit="saveAdd(event)" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Item Code</label>
                        <input type="text" id="add-itemCode" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. MK-001">
                    </div>
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Location</label>
                        <input type="text" id="add-location" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. Warehouse A">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Description</label>
                    <input type="text" id="add-description" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. Milk 1L">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Quantity</label>
                        <input type="number" id="add-qty" required min="1" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" value="1">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Expiry Date</label>
                        <input type="date" id="add-expiryDate" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Category</label>
                        <input type="text" id="add-category" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. Dairy">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Status</label>
                        <select id="add-status" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition bg-white">
                            <option value="Active">Active</option>
                            <option value="Expiring">Expiring</option>
                            <option value="Expired">Expired</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Return Type</label>
                        <input type="text" id="add-returnType" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. Non-Returnable">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Supplier Name</label>
                        <input type="text" id="add-supplierName" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g. AgriTrade">
                    </div>
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeAddModal()" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg font-semibold hover:bg-gray-50 transition">Cancel</button>
                    <button type="submit" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition">Add Item</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
